<!doctype html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Biografía</title>

    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Open+Sans&display=swap" rel="stylesheet">

    <style>
        body {
            background: #d6c8b5;
            font-family: "Open Sans", sans-serif;
            padding: 40px;
        }

        .pagina {
            max-width: 900px;
            background: #f7f4ee;
            margin: auto;
            padding: 40px;
            border: 6px double #333;
        }

        h1 {
            text-align: center;
            font-family: "Playfair Display", serif;
            font-size: 56px;
            margin-bottom: 30px;
            border-bottom: 2px solid #333;
        }

        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 25px;
        }

        .foto img {
            max-width: 280px;
            border: 4px solid #ccc;
            display: block;
        }

        .datos {
            background: #e6dfd2;
            padding: 20px;
            margin-bottom: 20px;
        }

        .seccion h3 {
            background: #e1d8c7;
            padding: 8px;
            font-family: "Playfair Display", serif;
        }

        .acciones {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-top: 10px;
        }

        .boton {
            display: block;
            width: 100%;
            padding: 14px 18px;
            border-radius: 14px;
            text-decoration: none;
            text-align: center;
            background: linear-gradient(135deg, #2563eb, #0ea5e9);
            color: white;
            font-size: 16px;
            font-weight: bold;
            transition: all 0.3s ease;
            box-shadow: 0 10px 20px rgba(37, 99, 235, 0.25);
        }

        .boton:hover {
            transform: translateY(-2px);
            box-shadow: 0 14px 24px rgba(37, 99, 235, 0.35);
        }

        .boton:active {
            transform: scale(0.98);
        }

    </style>
</head>

<body>

<div class="pagina">

    <h1>BIOGRAFÍA</h1>

    <div class="grid">

        <div>
            <div class="foto">
                <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/4/4d/Cat_November_2010-1a.jpg/250px-Cat_November_2010-1a.jpg">
            </div>

            <div class="seccion">
                <h3>Un poco de mí</h3>
                <p th:text="${unPocoDeMi}"></p>
            </div>
        </div>

        <div>
            <div class="datos">
                <p><strong>Nombre:</strong> <span th:text="${nombre}"></span></p>
                <p><strong>Fecha de nacimiento:</strong> <span th:text="${fechaNacimiento}"></span></p>
                <p><strong>Nacionalidad:</strong> <span th:text="${nacionalidad}"></span></p>
            </div>

            <div class="seccion">
                <h3>Pasatiempos</h3>
                <ul>
                    <li th:each="p : ${pasatiempos}" th:text="${p}"></li>
                </ul>
            </div>
        </div>

    </div>
    <div class="acciones">
        <a class="boton" th:href="@{/home}">Ir a Home</a>
    </div>
</div>

</body>
</html>
