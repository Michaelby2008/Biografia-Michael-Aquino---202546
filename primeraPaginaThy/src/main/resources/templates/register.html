<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro de Usuario</title>
    <style>
        /* Mantenemos tus estilos originales */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #0f172a, #1e3a8a, #38bdf8);
            padding: 20px;
        }
        .contenedor { width: 100%; max-width: 420px; }
        .tarjeta {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(8px);
            border-radius: 24px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.25);
            padding: 35px 30px;
            text-align: center;
            animation: aparecer 0.6s ease;
        }
        @keyframes aparecer {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .titulo { font-size: 30px; color: #0f172a; margin-bottom: 10px; }
        .subtitulo { font-size: 15px; color: #475569; margin-bottom: 25px; }
        .mensaje {
            margin-bottom: 18px;
            padding: 12px 14px;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 500;
            text-align: center;
        }
        .error { background: #fee2e2; color: #b91c1c; border: 1px solid #fecaca; }
        .success { background: #dcfce7; color: #15803d; border: 1px solid #bbf7d0; }
        .campo { margin-bottom: 18px; text-align: left; }
        .campo label {
            display: block;
            font-size: 13px;
            color: #64748b;
            margin-bottom: 6px;
            text-transform: uppercase;
            font-weight: 600;
        }
        .campo input {
            width: 100%;
            padding: 14px 16px;
            border: 1px solid #dbeafe;
            border-radius: 14px;
            font-size: 15px;
            outline: none;
            background: #f8fafc;
        }
        .acciones { display: flex; flex-direction: column; gap: 12px; margin-top: 10px; }
        .boton {
            display: block;
            width: 100%;
            padding: 14px 18px;
            border-radius: 14px;
            text-decoration: none;
            text-align: center;
            background: linear-gradient(135deg, #2563eb, #0ea5e9);
            color: white;
            font-size: 16px;
            font-weight: bold;
            border: none;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .boton-login {
            background: #0f172a; /* Un color oscuro para diferenciarlo */
        }
        .boton:hover { transform: translateY(-2px); }
    </style>
</head>
<body>

<div class="contenedor">
    <div class="tarjeta">
        <h2 class="titulo">Registro</h2>
        <p class="subtitulo" th:if="${success == null}">Crea tu cuenta ahora</p>
        <p class="subtitulo" th:if="${success != null}">¡Todo listo!</p>

        <div th:if="${error}" class="mensaje error" th:text="${error}"></div>

        <div th:if="${success}" class="mensaje success" th:text="${success}"></div>

        <form th:if="${success == null}" th:action="@{/register}" method="post">
            <div class="campo">
                <label for="username">Usuario</label>
                <input type="text" id="username" name="username" placeholder="Tu nombre de usuario" required>
            </div>

            <div class="campo">
                <label for="password">Contraseña</label>
                <input type="password" id="password" name="password" placeholder="Tu contraseña" required>
            </div>

            <button type="submit" class="boton">Registrarme</button>
        </form>

        <div class="acciones">
            <a th:href="@{/login}" class="boton" th:classappend="${success != null} ? 'boton-login' : 'boton-login'"
               style="margin-top: 10px; background: #64748b;">
                Ir al Inicio de Sesión
            </a>
        </div>
    </div>
</div>

</body>
</html>
